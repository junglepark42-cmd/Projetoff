<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>JP · Pilotage OFF</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--c1:#12121a;--c2:#1a1a26;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);--ac:#7c6bff;--ac2:#5b4de8;--gr:#22c55e;--am:#f59e0b;--rd:#ef4444;--bl:#3b82f6;--tx:#f1f0ff;--t2:#8b8aaa;--t3:#3d3d5c;--r:14px;--r2:10px;--nh:68px;--font:"Plus Jakarta Sans",sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
.card{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.cp{padding:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r2);border:none;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none}
.btn-p{background:var(--ac);color:#fff}.btn-p:active{background:var(--ac2);transform:scale(.97)}
.btn-g{background:rgba(255,255,255,.06);color:var(--tx)}.btn-g:active{background:rgba(255,255,255,.1)}
.btn-d{background:rgba(239,68,68,.12);color:var(--rd)}
.btn-sm{padding:7px 13px;font-size:13px}.btn-xs{padding:5px 10px;font-size:12px;border-radius:8px}
.wf{width:100%;justify-content:center}
input,select,textarea{font-family:var(--font);background:var(--c2);border:1px solid var(--bd2);border-radius:var(--r2);color:var(--tx);font-size:15px;padding:12px 14px;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
select option{background:#1a1a26}
textarea{resize:vertical;min-height:80px}
label{font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fi{margin-bottom:14px}
.fr{display:grid;gap:12px;margin-bottom:14px}
.c2{grid-template-columns:1fr 1fr}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-gr{background:rgba(34,197,94,.15);color:var(--gr)}.b-am{background:rgba(245,158,11,.15);color:var(--am)}
.b-rd{background:rgba(239,68,68,.15);color:var(--rd)}.b-ac{background:rgba(124,107,255,.15);color:var(--ac)}
.b-dm{background:rgba(255,255,255,.06);color:var(--t2)}

/* LOGIN */
#sl{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(124,107,255,.12) 0%,transparent 70%),var(--bg)}
.lbox{width:100%;max-width:380px}
.llogo{text-align:center;margin-bottom:32px}
.lmark{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--ac),#b06bff);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 8px 32px rgba(124,107,255,.3)}
.llogo h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.llogo p{font-size:13px;color:var(--t2);margin-top:4px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.mbtn{background:var(--c1);border:2px solid var(--bd);border-radius:var(--r);padding:16px 12px;cursor:pointer;text-align:center;font-family:var(--font);transition:all .15s}
.mbtn.sel{border-color:var(--ac);background:rgba(124,107,255,.08)}.mbtn:active{transform:scale(.97)}
.me{font-size:30px;display:block;margin-bottom:6px}
.mn{font-size:14px;font-weight:700;color:var(--tx)}
.mr{font-size:11px;color:var(--t2);margin-top:2px}
.pin{text-align:center;letter-spacing:12px;font-size:24px;font-weight:700;padding:16px;background:var(--c1);border:2px solid var(--bd);margin-bottom:14px}
.pin:focus{border-color:var(--ac)}
.lerr{color:var(--rd);font-size:13px;text-align:center;margin-top:8px;min-height:18px}

/* APP */
#sa{min-height:100vh;padding-bottom:var(--nh);display:none}
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;background:rgba(10,10,15,.95);backdrop-filter:blur(12px)}
.tbrand{font-size:16px;font-weight:800;letter-spacing:-.5px}.tbrand span{color:var(--ac)}
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nh);background:rgba(10,10,15,.96);backdrop-filter:blur(16px);border-top:1px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:none;font-family:var(--font);color:var(--t3);transition:color .15s;padding:8px 0}
.ni.active{color:var(--ac)}
.ni-icon{font-size:22px;line-height:1}.ni-lbl{font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.page{display:none;padding:16px}
.page.active{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ptitle{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:16px}.ptitle span{color:var(--ac)}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ph .ptitle{margin-bottom:0}
.slbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:16px 0 8px}
.slbl:first-child{margin-top:0}

/* HOME / KPI */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.kval{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.klbl{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.ksub{font-size:11px;margin-top:4px;font-weight:600}
.arow{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--c1);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:8px}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* WEEK CALENDAR (HOME) */
.wkcal{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.wkday{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.wkday-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.wkday-hd.today{border-left:3px solid var(--ac)}
.wkday-name{font-size:14px;font-weight:700;flex:1}
.wkday-cnt{font-size:12px;font-weight:700}
.wkday-body{display:none;padding:0 14px 10px}
.wkday.open .wkday-body{display:block}
.wkchev{color:var(--t3);font-size:11px;transition:transform .2s}
.wkday.open .wkchev{transform:rotate(90deg)}

/* TASKS */
.mstrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.mstrip::-webkit-scrollbar{display:none}
.mpill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;background:var(--c1);border:2px solid var(--bd);border-radius:12px;cursor:pointer;min-width:72px;transition:all .15s}
.mpill.active{border-color:var(--ac);background:rgba(124,107,255,.08)}
.mpill-e{font-size:24px}.mpill-n{font-size:12px;font-weight:700}.mpill-c{font-size:10px;color:var(--t2)}
.tabbar{display:flex;background:var(--c1);border-radius:12px;padding:3px;gap:3px;margin-bottom:16px}
.tabbtn{flex:1;padding:9px;border-radius:9px;border:none;background:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s}
.tabbtn.active{background:var(--c2);color:var(--ac)}
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.wbtn{width:36px;height:36px;background:var(--c1);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.wlbl{font-size:14px;font-weight:700}
.dblock{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.dhd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.dhd.today{border-left:3px solid var(--ac)}
.dtitle{font-size:15px;font-weight:700}.dmeta{font-size:12px;color:var(--t2)}
.dbody{padding:0 14px 10px;display:none}
.dblock.open .dbody{display:block}
.dchev{color:var(--t3);font-size:12px;transition:transform .2s}
.dblock.open .dchev{transform:rotate(90deg)}
.trow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.trow:last-child{border-bottom:none}
.tck{width:22px;height:22px;border-radius:7px;border:2px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.tck.done{background:var(--gr);border-color:var(--gr)}.tck.done::after{content:"checkmark";font-size:0}
.tck.done::before{content:"✓";color:#fff;font-size:13px;font-weight:700}
.ttx{flex:1;font-size:14px}.ttx.done{text-decoration:line-through;color:var(--t2)}
.tcat{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.06);color:var(--t2)}

/* PROJECTS */
.pcard{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.pchd{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
.pst{width:4px;height:48px;border-radius:2px;flex-shrink:0}
.pinf{flex:1;min-width:0}
.pnm{font-size:15px;font-weight:700}.pmt{font-size:12px;color:var(--t2);margin-top:3px}
.pbw{height:3px;background:var(--c2);border-radius:2px;margin-top:6px}
.pb{height:100%;border-radius:2px;transition:width .4s}
.pcv{color:var(--t3);transition:transform .2s;font-size:14px;flex-shrink:0}
.pcard.open .pcv{transform:rotate(90deg)}
.pcbd{display:none;padding:0 14px 14px}
.pcard.open .pcbd{display:block}
.prsel{font-size:11px;padding:3px 8px;border-radius:20px;border:none;cursor:pointer;font-family:var(--font);font-weight:600;outline:none;flex-shrink:0}

/* MISSIONS */
.miss{display:flex;flex-direction:column;gap:0;padding:12px;background:var(--c2);border-radius:var(--r2);border:1px solid var(--bd);margin-bottom:6px}
.miss-top{display:flex;align-items:center;gap:10px}
.mnum{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.mn-done{background:var(--gr);color:#fff}.mn-act{background:var(--am);color:#000}.mn-lk{background:var(--c2);color:var(--t3);border:1px solid var(--bd)}
.mtx{flex:1;font-size:14px;font-weight:500;line-height:1.3}
.mctrl{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-left:36px;margin-top:8px}
.msel{font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:var(--font);font-weight:600;outline:none;border:none;width:auto}
.mdi{font-size:12px;padding:4px 8px;background:var(--c1);border:1px solid var(--bd);border-radius:8px;color:var(--t2);width:auto}
.mni{font-size:12px;padding:4px 10px;background:var(--c1);border:1px solid var(--bd);border-radius:8px;color:var(--t2);flex:1;min-width:80px}
.mbl{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--rd);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:20px;padding:4px 10px}
.mbl select{background:none;border:none;color:var(--rd);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;outline:none;padding:0}
.bdone{background:var(--gr);color:#fff;border:none;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}
.miss.done-m{opacity:.5}.miss.lk-m{opacity:.35;pointer-events:none}.miss.act-m{border-color:rgba(124,107,255,.3)}
.ctrow{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--bd);margin-bottom:4px}
.ctnm{flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctsel{font-size:11px;padding:3px 8px;border-radius:20px;font-family:var(--font);font-weight:600;cursor:pointer;outline:none;border:none;width:auto}

/* BUDGET */
.bkpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.bkpi{background:var(--c2);border-radius:var(--r2);padding:10px 12px;text-align:center}
.bkv{font-size:18px;font-weight:800}.bkl{font-size:10px;color:var(--t2);margin-top:2px;font-weight:600;text-transform:uppercase}
.prog{height:7px;background:var(--c2);border-radius:4px;overflow:hidden;margin:6px 0}
.pf{height:100%;border-radius:4px;transition:width .4s}
.depr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.depr:last-child{border-bottom:none}
.depd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.depi{flex:1;min-width:0}.depnm{font-size:13px;font-weight:600}.depsb{font-size:11px;color:var(--t2);margin-top:2px}
.depam{font-size:15px;font-weight:800;white-space:nowrap}
.depsl{font-size:11px;padding:3px 8px;border-radius:20px;font-family:var(--font);font-weight:600;cursor:pointer;outline:none;border:none;width:auto}

/* CRM */
.crmf{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.crmf::-webkit-scrollbar{display:none}
.crmbtn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--bd);background:var(--c1);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:var(--font);transition:all .15s}
.crmbtn.active{background:rgba(124,107,255,.12);border-color:var(--ac);color:var(--ac)}
.srch{margin-bottom:12px;position:relative}
.srch input{padding-left:38px}
.sic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:16px;pointer-events:none}
.crmcard{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;padding:14px;cursor:pointer;transition:border-color .15s}
.crmcard:active{opacity:.85}
.crmt{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.crmnm{font-size:15px;font-weight:700}.crmct{font-size:11px;color:var(--t2);margin-top:2px}
.crmb{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pdot{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600}
.pdot::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}

/* SHEET */
.sbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}
.sbg.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--c1);border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto;z-index:201;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,0,.67,0)}
.sheet.open{transform:translateY(0)}
.sh-hd{padding:8px 16px 12px;border-bottom:1px solid var(--bd)}
.sh-hd h2{font-size:18px;font-weight:800}.sh-hd p{font-size:13px;color:var(--t2);margin-top:3px}
.shbody{padding:16px}
.shdl{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 0}

/* COM */
.seg{display:flex;background:var(--c1);border-radius:12px;padding:3px;gap:2px}
.sgbtn{flex:1;padding:7px 14px;border-radius:9px;border:none;background:none;font-family:var(--font);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s}
.sgbtn.active{background:var(--c2);color:var(--ac)}
.comctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.comnav{display:flex;align-items:center;gap:8px;margin-left:auto}
.comlbl{font-size:13px;font-weight:700;min-width:110px;text-align:center}
.objcard{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:14px}
.objparks{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px}
.objpk{flex:1;min-width:110px}
.objpkhd{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;font-weight:700}
.daycom{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.dchead{display:flex;align-items:center;justify-content:space-between;padding:12px 14px}
.dchead.today{border-left:3px solid var(--ac)}
.dclbl{font-size:15px;font-weight:700}
.addpub{font-size:12px;padding:5px 12px;background:rgba(124,107,255,.1);color:var(--ac);border:1px solid rgba(124,107,255,.2);border-radius:8px;cursor:pointer;font-family:var(--font);font-weight:600}
.pubcard{padding:12px 14px;border-bottom:1px solid var(--bd)}
.pubcard:last-child{border-bottom:none}
.pubtop{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.plats{display:flex;gap:5px;flex-wrap:wrap}
.plat{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.pl-fb{background:#1877f2;color:#fff}.pl-ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
.pl-tk{background:#000;color:#fff;border:1px solid #333}.pl-gb{background:#4285f4;color:#fff}
.pubinf{flex:1;min-width:0}.pubnm{font-size:14px;font-weight:700}.pubmt{font-size:11px;color:var(--t2);margin-top:2px}
.pubedt{background:none;border:1px solid var(--bd);border-radius:8px;color:var(--t2);padding:6px 12px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);white-space:nowrap}
.pubsl{width:100%;font-size:13px;padding:8px 12px;border-radius:10px;cursor:pointer}
.mgrid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.mpub{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:var(--c1);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);animation:su .22s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 0}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--bd)}
.mtitle{font-size:18px;font-weight:800}
.mcbtn{width:30px;height:30px;border-radius:50%;background:var(--c2);border:none;color:var(--t2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mbdy{padding:16px}
.mft{padding:12px 16px 16px;display:flex;gap:10px}
.mft .btn{flex:1;padding:14px;font-size:15px}

/* MISS EDITOR */
.meit{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r2);padding:12px;margin-bottom:8px}
.merow{display:flex;align-items:center;gap:8px}
.menum{width:28px;height:28px;border-radius:50%;background:var(--c1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0}
.metag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;flex-shrink:0}
.meinput{flex:1;background:var(--c1);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:var(--font);font-size:14px;padding:9px 12px;outline:none}
.meinput:focus{border-color:var(--ac)}
.medel{width:30px;height:30px;background:rgba(239,68,68,.1);border:none;border-radius:8px;color:var(--rd);font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.metbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}

async function supaFetch(table, method, body, query) {
  query = query || '';
  const opts = {
    method: method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Prefer': (method==='POST') ? 'resolution=merge-duplicates,return=minimal' : '',
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/' + table + query, opts);
    if (!res.ok) { console.error('Supa', method, table, res.status); return null; }
    const txt = await res.text();
    return txt ? JSON.parse(txt) : true;
  } catch(e) { console.error('Supa fetch error:', e); return null; }
}

  for (const p of S.publications) {
    ops.push(supaFetch('off_publications', 'POST', {
      id:p.id, name:p.name, date:p.date||null, park:p.park||'jungle',
      resp:p.resp||'', status:p.status||'idee', platforms:p.platforms||[],
      desc:p.desc||'', vues:p.vues||'', likes:p.likes||'',
      comments:p.comments||'', shares:p.shares||''
    }, '?on_conflict=id'));
  }
  for (const t of S.tasks) {
    ops.push(supaFetch('off_taches', 'POST', {
      id:t.id, name:t.name, who:t.who, day:t.day||'',
      freq:t.freq||'hebdo', cat:t.cat||'autre', note:t.note||'',
      type:t.type||'rec', date_exc:t.dateExc||null
    }, '?on_conflict=id'));
  }
  await Promise.all(ops);
}

async function dbLoad() {
  const [parts, projs, pubs, taches] = await Promise.all([
    supaFetch('off_partenaires', 'GET', null, '?order=name'),
    supaFetch('off_projets', 'GET', null, '?order=name'),
    supaFetch('off_publications', 'GET', null, '?order=date.desc'),
    supaFetch('off_taches', 'GET', null, ''),
  ]);
  if (parts && parts.length) S.partners = parts.map(p => ({
    ...p, crmProjects:p.crm_projects||[], interactions:p.interactions||[]
  }));
  if (projs && projs.length) S.projects = projs.map(p => ({
    ...p, heuresEst:p.heures_est||0, heuresReal:p.heures_real||0,
    missions:p.missions||[], depenses:p.depenses||[]
  }));
  if (pubs && pubs.length) S.publications = pubs;
  if (taches && taches.length) S.tasks = taches;
  console.log('Chargé:', S.partners.length, 'partenaires,', S.projects.length, 'projets,', S.publications.length, 'pubs,', S.tasks.length, 'tâches');
}

function setMS(pid,mid,v){
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  const m=p.missions.find(x=>x.id===mid);if(!m)return;
  m.mstatus=v;if(v==='fait'){m.done=true;m.date=td();}
  renderTasksContent();renderHome();
  if(v==='bloque')toast('🔴 Mission bloquée — indique qui peut aider');
}
function setMF(pid,mid,f,v){const p=S.projects.find(x=>x.id===pid);if(!p)return;const m=p.missions.find(x=>x.id===mid);if(!m)return;m[f]=v;if(f==='blocker')renderTasksContent();}
function compM(pid,mid){const p=S.projects.find(x=>x.id===pid);if(!p)return;const m=p.missions.find(x=>x.id===mid);if(!m)return;m.done=true;m.date=td();m.mstatus='fait';renderTasksContent();renderHome();toast('Mission complétée ✓');}
function setCTS(pid,mid,ci,v){
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  const m=p.missions.find(x=>x.id===mid);if(!m||!m.contacts)return;
  m.contacts[ci].status=v;
  const ppid=m.contacts[ci].partnerId;
  if(ppid){const pt=S.partners.find(x=>x.id===ppid);if(pt){if(v==='accepte')pt.pipeline='actif';else if(v==='contacte')pt.pipeline='contacte';else if(v==='attente'||v==='negocia')pt.pipeline='attente';}}
  renderTasksContent();
}
function qPrio(id,v){const p=S.projects.find(x=>x.id===id);if(p){p.priority=v;renderTasksContent();}}
function delProj(id){if(!confirm('Supprimer ce projet ?'))return;S.projects=S.projects.filter(p=>p.id!==id);supaFetch('off_projets','DELETE',null,'?id=eq.'+id);renderTasksContent();renderHome();}

function renderBudg(c){

  const tp=pjs.reduce((a,p)=>a+calcPaye(p),0),te=pjs.reduce((a,p)=>a+calcEngage(p),0);
  const pct=tb>0?Math.min(100,Math.round((tp+te)/tb*100)):0,over=tb>0&&(tp+te)>tb;
  c.innerHTML=(tb>0?`<div class="card cp" style="margin-bottom:12px;${over?'border-color:var(--rd)':''}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:700">Budget global</span>${over?'<span class="badge b-rd">Dépassement</span>':'<span class="badge b-gr">OK</span>'}</div>
    <div class="bkpis">

      <div class="bkpi"><div class="bkv" style="color:${over?'var(--rd)':'var(--am)'}">${te.toFixed(0)}€</div><div class="bkl">Engagé</div></div>

    const deps=p.depenses||[];
    const catc={materiel:'#3b82f6',prestataire:'#7c6bff',com:'#f59e0b',deplacement:'#22c55e',formation:'#ec4899',autre:'#8b8aaa'};
    return`<div class="card" style="margin-bottom:10px">

      </div>
      ${bg>0?`<div style="padding:10px 14px 0"><div class="prog"><div class="pf" style="width:${pct2}%;background:${ov2?'var(--rd)':pct2>80?'var(--am)':'var(--gr)'}"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-top:4px;margin-bottom:8px"><span>Payé: ${py}€ · Engagé: ${en}€</span><span style="color:${ov2?'var(--rd)':'var(--t2)'}">Reste: ${(bg-tot).toFixed(0)}€</span></div></div>`:''}
      <div style="padding:0 14px 14px">
        ${deps.length===0?'<div style="color:var(--t2);font-size:13px;padding:8px 0">Aucune dépense</div>':deps.map(d=>{
          const dst=DEPS[d.status]||DEPS.devis;
          return`<div class="depr"><div class="depd" style="background:${catc[d.cat]||'#8b8aaa'}"></div>
            <div class="depi"><div class="depnm">${d.name}</div><div class="depsb">${d.cat||''}${d.four?' · '+d.four:''}${d.date?' · '+d.date:''}</div></div>
            <div class="depam" style="color:${d.status==='paye'?'var(--gr)':'var(--tx)'}">${(parseFloat(d.montant)||0).toFixed(0)}€</div>
            <select class="depsl" style="background:rgba(255,255,255,.05);color:${dst.c};border:none" onchange="updDepSt('${p.id}','${d.id}',this.value)">
              ${Object.entries(DEPS).map(([k,v])=>`<option value="${k}" ${d.status===k?'selected':''}>${v.l}</option>`).join('')}
            </select>
            <button onclick="delDep('${p.id}','${d.id}')" style="background:none;border:none;color:var(--rd);cursor:pointer;font-size:16px;padding:0 2px">×</button>
          </div>`;}).join('')}
      </div>

function updDepSt(pid,did,v){const p=S.projects.find(x=>x.id===pid);if(!p)return;const d=(p.depenses||[]).find(x=>x.id===did);if(d)d.status=v;renderTasksContent();}
function delDep(pid,did){if(!confirm('Supprimer ?'))return;const p=S.projects.find(x=>x.id===pid);if(!p)return;p.depenses=(p.depenses||[]).filter(x=>x.id!==did);renderTasksContent();toast('Dépense supprimée');}

// ═══ MODAL TASK ═══
function setTaskType(type){
  g('t-type').value=type;
  const isRec=type==='rec';
  g('t-rec-fields').style.display=isRec?'':'none';
  g('t-exc-fields').style.display=isRec?'none':'';
  g('t-type-rec').style.cssText=`flex:1;padding:10px;border-radius:10px;border:2px solid ${isRec?'var(--ac)':'var(--bd)'};background:${isRec?'rgba(124,107,255,.1)':'none'};color:${isRec?'var(--ac)':'var(--t2)'};font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer`;
  g('t-type-exc').style.cssText=`flex:1;padding:10px;border-radius:10px;border:2px solid ${!isRec?'var(--am)':'var(--bd)'};background:${!isRec?'rgba(245,158,11,.1)':'none'};color:${!isRec?'var(--am)':'var(--t2)'};font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer`;
}
function taskVisible(t, dayIdx, dateStr, weekNum){
  // Tâche exceptionnelle : uniquement sur sa date exacte
  if(t.type==='exc') return (t.dateExc||'')=== dateStr;
  // Tâche récurrente : vérifier jour + fréquence
  if(parseInt(t.day)!==dayIdx) return false;
  const f=t.freq||'hebdo';
  if(f==='hebdo') return true;
  if(f==='bi') return weekNum%2===0;
  const d=new Date(dateStr);
  const weekOfMonth=Math.ceil(d.getDate()/7);
  if(f==='mensuel_1') return weekOfMonth===1;
  if(f==='mensuel_2') return weekOfMonth===2;
  if(f==='mensuel_3') return weekOfMonth===3;
  if(f==='mensuel_4') return weekOfMonth===4;
  return true;
}
function openAddTask(di=null){
  g('mt-title').textContent='Nouvelle tâche';g('t-eid').value='';
  fillSel('t-who',S.cm);fillSel('t-who-exc',S.cm);
  g('t-name').value='';g('t-note').value='';
  if(di!==null)g('t-day').value=di;
  g('t-freq').value='hebdo';g('t-cat').value='autre';g('t-cat-exc').value='autre';
  g('t-date-exc').value=td();
  setTaskType('rec');
  om('mo-task');
}
function openAddTaskDay(di){
  openAddTask(di);
}
function openAddTaskDate(dateStr){
  openAddTask();
  setTaskType('exc');
  g('t-date-exc').value=dateStr;
  // Trouver le jour de la semaine
  const d=new Date(dateStr);
  const dayIdx=d.getDay()===0?6:d.getDay()-1;
  g('t-day').value=dayIdx;
}
function openEditTask(id){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  g('mt-title').textContent='Modifier la tâche';g('t-eid').value=id;
  g('t-name').value=t.name;g('t-note').value=t.note||'';
  fillSel('t-who',t.who);fillSel('t-who-exc',t.who);
  const isExc=t.type==='exc';
  setTaskType(isExc?'exc':'rec');
  if(isExc){
    g('t-date-exc').value=t.dateExc||td();
    g('t-cat-exc').value=t.cat||'autre';
  } else {
    g('t-day').value=t.day||'0';
    g('t-freq').value=t.freq||'hebdo';
    g('t-cat').value=t.cat||'autre';
  }
  om('mo-task');
}
function delTask(id){
  if(!confirm('Supprimer cette tâche ?'))return;
  S.tasks=S.tasks.filter(x=>x.id!==id);
  supaFetch('off_taches','DELETE',null,'?id=eq.'+id);
  renderTasks();renderHome();toast('Tâche supprimée');
}
function saveTask(){
  const name=g('t-name').value.trim();if(!name){toast('⚠️ Titre obligatoire');return;}
  const eid=g('t-eid').value;
  const type=g('t-type').value;
  let data;
  if(type==='exc'){
    const dateExc=g('t-date-exc').value;
    if(!dateExc){toast('⚠️ Date obligatoire');return;}
    data={id:eid||uid(),name,type:'exc',dateExc,who:g('t-who-exc').value,cat:g('t-cat-exc').value,note:g('t-note').value,day:'',freq:'none'};
  } else {
    data={id:eid||uid(),name,type:'rec',who:g('t-who').value,day:g('t-day').value,freq:g('t-freq').value,cat:g('t-cat').value,note:g('t-note').value};
  }
  if(eid){const i=S.tasks.findIndex(x=>x.id===eid);if(i>=0)S.tasks[i]=data;}
  else S.tasks.push(data);
  cm('mo-task');renderTasks();renderHome();toast(eid?'Tâche modifiée ✓':'Tâche ajoutée ✓');dbSave();
}

function renderCRM(){

    if(S.crmQ&&!p.name.toLowerCase().includes(S.crmQ.toLowerCase())&&!(p.ville||'').toLowerCase().includes(S.crmQ.toLowerCase()))return false;

    <div style="font-size:12px;color:var(--t2);margin-bottom:12px;font-weight:600">${data.length} contact${data.length!==1?'s':''}</div>

function comSP(p){S.comPark=p;renderCom();}
function comMv(d){if(S.comView==='semaine')S.comWk+=d;else S.comMonth=new Date(S.comMonth.getFullYear(),S.comMonth.getMonth()+d,1);comRC();}
function comFlt(pubs){if(S.comPark==='all')return pubs;return pubs.filter(p=>{const v=p.park||'jungle';return v===S.comPark||v==='both';});}

function comObj(pubs,view){
  const parks=S.comPark==='all'?['jungle','sweety']:[S.comPark];
  const obj=view==='semaine'?3:13;
  const rows=parks.map(pk=>{
    const n=pubs.filter(p=>{const v=p.park||'jungle';return(v===pk||v==='both')&&(p.status==='publie'||p.status==='programme');}).length;
    const pct=Math.min(100,Math.round(n/obj*100)),col=n>=obj?'var(--gr)':n>=Math.round(obj*.6)?'var(--am)':'var(--rd)';
    return`<div class="objpk"><div class="objpkhd"><span>${pk==='jungle'?'🌿 Jungle':'🍭 Sweety'}</span><span style="font-size:13px;font-weight:800;color:${col}">${n}/${obj}</span></div><div class="prog"><div class="pf" style="width:${pct}%;background:${col}"></div></div></div>`;
  }).join('');
  return`<div class="objcard"><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:8px">OBJECTIF ${obj} pubs/parc/${view==='semaine'?'semaine':'mois'}</div><div class="objparks">${rows}</div></div>`;
}

function pubCard(p){
  const st=COMST[p.status]||COMST.idee,pk=PKI[p.park||'jungle']||'🌿';
  const plats=(p.platforms||[]).map(x=>PLH[x]||'').join('');
  return`<div class="pubcard">
    <div class="pubtop">
      <div class="plats"><span style="font-size:18px">${pk}</span>${plats}</div>
      <div class="pubinf"><div class="pubnm">${p.name}</div><div class="pubmt">${p.resp||''}${p.date?' · '+p.date:''}</div></div>
      <button class="pubedt" onclick="openEditPub('${p.id}')">✏️</button>
    </div>
    <select class="pubsl" style="color:${st.c};border-color:var(--bd)" onchange="qPubSt('${p.id}',this.value)">
      ${Object.entries(COMST).map(([k,v])=>`<option value="${k}" ${p.status===k?'selected':''}>${v.l}</option>`).join('')}
    </select>
  </div>`;
}

function comRC(){
  const lbl=g('comlbl'),obj=g('com-obj'),ct=g('com-ct');
  if(!lbl||!obj||!ct)return;
  const now=td();
  if(S.comView==='semaine'){
    const days=wkd(S.comWk);
    lbl.textContent=fmt(days[0])+' – '+fmt(days[6]);
    let pubs=S.publications.filter(p=>p.date>=days[0].toISOString().slice(0,10)&&p.date<=days[6].toISOString().slice(0,10));
    pubs=comFlt(pubs);
    obj.innerHTML=comObj(pubs,'semaine');
    ct.innerHTML='<div style="display:flex;flex-direction:column;gap:8px">'+days.map((d,i)=>{
      const ds=d.toISOString().slice(0,10),isT=ds===now,dp=pubs.filter(p=>p.date===ds);
      return`<div class="daycom">
        <div class="dchead ${isT?'today':''}">
          <span class="dclbl" style="${isT?'color:var(--ac)':''}">${DF[i]} <span style="font-size:12px;color:var(--t2);font-weight:400">${fmt(d)}</span></span>
          <button class="addpub" onclick="openAddPubDate('${ds}')">+ pub</button>
        </div>
        ${dp.map(p=>pubCard(p)).join('')}
      </div>`;
    }).join('')+'</div>';
  } else {
    const m=S.comMonth,ms=m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0');
    lbl.textContent=MN[m.getMonth()]+' '+m.getFullYear();
    let pubs=S.publications.filter(p=>p.date&&p.date.startsWith(ms));
    pubs=comFlt(pubs);pubs.sort((a,b)=>a.date.localeCompare(b.date));
    obj.innerHTML=comObj(pubs,'mois');
    ct.innerHTML=pubs.length===0?'<div class="card cp" style="text-align:center;color:var(--t2)">Aucune publication ce mois</div>':
      `<div class="mgrid2">${pubs.map(p=>`<div class="mpub">${pubCard(p)}</div>`).join('')}</div>`;
  }
}
function qPubSt(id,v){const p=S.publications.find(x=>x.id===id);if(p){p.status=v;comRC();}}

function openAddPub(ds){
  S.comEditId=null;g('mpub-t').textContent='Nouvelle publication';g('pub-id').value='';
  g('pub-name').value='';g('pub-date').value=ds||td();g('pub-park').value='jungle';g('pub-st').value='idee';g('pub-desc').value='';
  g('pub-vues').value='';g('pub-likes').value='';g('pub-comments').value='';g('pub-shares').value='';
  ['pub-fb','pub-ig','pub-tk','pub-gb'].forEach(id=>g(id).checked=false);
  fillSel('pub-resp','constance');om('mo-pub');
}
function openAddPubDate(ds){openAddPub(ds);}
function openEditPub(id){
  const p=S.publications.find(x=>x.id===id);if(!p)return;
  S.comEditId=id;g('mpub-t').textContent='Modifier';g('pub-id').value=id;
  g('pub-name').value=p.name||'';g('pub-date').value=p.date||'';g('pub-park').value=p.park||'jungle';
  g('pub-st').value=p.status||'idee';g('pub-desc').value=p.desc||'';
  g('pub-vues').value=p.vues||'';g('pub-likes').value=p.likes||'';g('pub-comments').value=p.comments||'';g('pub-shares').value=p.shares||'';
  ['fb','ig','tk','gb'].forEach(pl=>g('pub-'+pl).checked=(p.platforms||[]).includes(pl));
  fillSel('pub-resp',p.resp||'constance');om('mo-pub');
}
function savePub(){
  const name=g('pub-name').value.trim();if(!name){toast('⚠️ Titre obligatoire');g('pub-name').focus();return;}
  const platforms=['fb','ig','tk','gb'].filter(pl=>g('pub-'+pl).checked);
  const data={id:S.comEditId||uid(),name,date:g('pub-date').value,park:g('pub-park').value,resp:g('pub-resp').value,status:g('pub-st').value,desc:g('pub-desc').value,platforms,vues:g('pub-vues').value,likes:g('pub-likes').value,comments:g('pub-comments').value,shares:g('pub-shares').value};
  const i=S.publications.findIndex(x=>x.id===data.id);
  if(i>=0)S.publications[i]=data;else S.publications.push(data);
  cm('mo-pub');comRC();renderHome();toast('Publication enregistrée ✓');dbSave();
}

// ═══ TEAM ═══
function renderTeam(){
  g('page-team').innerHTML=`
    <div class="ph"><div class="ptitle">Équipe</div><button class="btn btn-p btn-sm" onclick="openAddMem()">+ Membre</button></div>
    <div>${S.members.map(m=>`<div class="tcard">
      <div class="tctp"><span class="tcem">${m.emoji}</span><div class="tcinfo"><h3>${m.prenom}</h3><p>${m.role}</p></div><div style="width:10px;height:10px;border-radius:50%;background:${m.color};flex-shrink:0"></div></div>
      <div class="tcst"><span class="tcstl">Tâches récurrentes</span><span>${S.tasks.filter(t=>t.who===m.id).length}</span></div>
      <div class="tcst"><span class="tcstl">Projets actifs</span><span>${S.projects.filter(p=>p.who===m.id&&p.missions.some(x=>!mDone(x))).length}</span></div>
      <div class="tcst"><span class="tcstl">PIN</span><span style="letter-spacing:4px">••••</span></div>
      <div style="margin-top:12px"><button class="btn btn-g btn-sm wf" onclick="openEditMem('${m.id}')">✏️ Modifier</button></div>
    </div>`).join('')}</div>`;
}
function openAddMem(){g('mmem-t').textContent='Nouveau membre';g('mem-id').value='';g('mem-prenom').value='';g('mem-role').value='';g('mem-pin').value='';g('mem-emoji').value='';g('mem-contrat').value='CDI';g('mem-color').value='#7c6bff';om('mo-mem');}
function openEditMem(id){const m=S.members.find(x=>x.id===id);if(!m)return;g('mmem-t').textContent='Modifier';g('mem-id').value=id;g('mem-prenom').value=m.prenom;g('mem-role').value=m.role;g('mem-pin').value=m.pin;g('mem-emoji').value=m.emoji;g('mem-color').value=m.color;om('mo-mem');}
function saveMem(){
  const prenom=g('mem-prenom').value.trim();if(!prenom){toast('⚠️ Prénom obligatoire');return;}
  const id=g('mem-id').value||uid();
  const data={id,prenom,role:g('mem-role').value,pin:g('mem-pin').value||'0000',emoji:g('mem-emoji').value||'👤',color:g('mem-color').value};
  const i=S.members.findIndex(x=>x.id===id);if(i>=0)S.members[i]={...S.members[i],...data};else S.members.push(data);
  cm('mo-mem');renderTeam();renderLogin();toast('Enregistré ✓');
}

// ═══ OVERLAY CLOSE ═══
document.querySelectorAll('.mo').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});

// ═══ BOOT ═══
renderLogin();
</script>
